<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>ロードランナー</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #1a1208;
      color: #fff;
      touch-action: none;
      user-select: none;
    }

    #game-root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    #hud {
      display: flex;
      gap: 1rem;
      font-size: 0.875rem;
      font-weight: 700;
      flex-wrap: wrap;
      justify-content: center;
    }

    #canvas-wrap {
      position: relative;
      max-width: 100%;
    }

    canvas {
      display: block;
      max-width: min(98vw, 480px);
      height: auto;
      border: 3px solid #8b6914;
      border-radius: 4px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      text-align: center;
      padding: 1rem;
    }

    #overlay.is-visible {
      display: flex;
    }

    #overlay h2 {
      margin: 0 0 0.5rem;
      color: #feca57;
    }

    #overlay p {
      margin: 0 0 1rem;
      font-size: 0.875rem;
    }

    #overlay button {
      min-width: 44px;
      min-height: 44px;
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 999px;
      background: #feca57;
      color: #1a1208;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #touch-controls {
      display: none;
      width: 100%;
      max-width: 360px;
      gap: 0.375rem;
      grid-template-columns: repeat(4, 1fr);
    }

    .touch-btn {
      min-height: 52px;
      border: 2px solid #8b6914;
      border-radius: 10px;
      background: rgba(139, 105, 20, 0.35);
      color: #fff;
      font: inherit;
      font-size: 0.6875rem;
      font-weight: 700;
      cursor: pointer;
    }

    .touch-btn:active,
    .touch-btn.is-active {
      background: rgba(254, 202, 87, 0.4);
    }

    #hint {
      font-size: 0.6875rem;
      color: #aaa;
      text-align: center;
    }

    @media (pointer: coarse) {
      #touch-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="hud">
      <span id="score">💰 0 / 0</span>
      <span id="lives">❤️ × 3</span>
    </div>

    <div id="canvas-wrap">
      <canvas id="game" tabindex="0"></canvas>
      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p id="overlay-msg"></p>
        <button type="button" id="overlay-btn">スタート</button>
      </div>
    </div>

    <div id="touch-controls">
      <button type="button" class="touch-btn" data-action="left">←</button>
      <button type="button" class="touch-btn" data-action="up">↑</button>
      <button type="button" class="touch-btn" data-action="right">→</button>
      <button type="button" class="touch-btn" data-action="down">↓</button>
      <button type="button" class="touch-btn" data-action="dig-left">掘←</button>
      <button type="button" class="touch-btn" data-action="dig-right">掘→</button>
    </div>

    <p id="hint">Z / X で左右に穴を掘る。金塊を全部集めて出口へ！</p>
  </div>

  <script src="game.js"></script>
</body>
</html>
