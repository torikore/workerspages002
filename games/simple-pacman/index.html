<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>シンプルパックマン</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      touch-action: none;
      user-select: none;
    }

    #game-root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    #hud {
      display: flex;
      gap: 1rem;
      font-size: 0.875rem;
      font-weight: 700;
      flex-wrap: wrap;
      justify-content: center;
    }

    #canvas-wrap {
      position: relative;
      max-width: 100%;
    }

    canvas {
      display: block;
      max-width: min(95vw, 380px);
      height: auto;
      border: 3px solid #2121de;
      border-radius: 4px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      text-align: center;
      padding: 1rem;
    }

    #overlay.is-visible {
      display: flex;
    }

    #overlay h2 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      color: #ff0;
    }

    #overlay p {
      margin: 0 0 1rem;
      font-size: 0.875rem;
    }

    #overlay button {
      min-width: 44px;
      min-height: 44px;
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 999px;
      background: #ff0;
      color: #000;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #touch-controls {
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(2, 56px);
      gap: 4px;
    }

    .touch-btn {
      min-width: 56px;
      min-height: 56px;
      border: 2px solid #2121de;
      border-radius: 10px;
      background: rgba(33, 33, 222, 0.3);
      color: #fff;
      font: inherit;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
    }

    .touch-btn:active,
    .touch-btn.is-active {
      background: rgba(255, 255, 0, 0.35);
    }

    .touch-btn.hidden {
      visibility: hidden;
    }

    #hint {
      font-size: 0.6875rem;
      color: #888;
      text-align: center;
    }

    @media (pointer: coarse) {
      #touch-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="hud">
      <span id="score">スコア: 0</span>
      <span id="lives">❤️ × 3</span>
      <span id="dots-left">残り: 0</span>
    </div>

    <div id="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p id="overlay-msg"></p>
        <button type="button" id="overlay-btn">スタート</button>
      </div>
    </div>

    <div id="touch-controls">
      <button type="button" class="touch-btn hidden"></button>
      <button type="button" class="touch-btn" data-dir="up">↑</button>
      <button type="button" class="touch-btn hidden"></button>
      <button type="button" class="touch-btn" data-dir="left">←</button>
      <button type="button" class="touch-btn" data-dir="down">↓</button>
      <button type="button" class="touch-btn" data-dir="right">→</button>
    </div>

    <p id="hint">←→↑↓ で移動 / 全ドット取得でクリア</p>
  </div>

  <script src="game.js"></script>
</body>
</html>
