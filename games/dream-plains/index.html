<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>ドリーム平原 1面</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #5c94fc;
      touch-action: none;
      user-select: none;
    }

    #game-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.375rem 0.75rem;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    #canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #5c94fc;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      text-align: center;
      padding: 1rem;
    }

    #overlay.is-visible {
      display: flex;
    }

    #overlay h2 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    #overlay p {
      margin: 0 0 1rem;
      opacity: 0.9;
    }

    #overlay button {
      min-width: 44px;
      min-height: 44px;
      padding: 0.625rem 1.5rem;
      border: none;
      border-radius: 999px;
      background: #feca57;
      color: #2d3436;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #touch-controls {
      display: none;
      flex-shrink: 0;
      padding: 0.5rem;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.25);
      grid-template-columns: 1fr auto;
      align-items: end;
    }

    .touch-pad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 52px);
      gap: 4px;
    }

    .touch-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .touch-btn {
      min-width: 52px;
      min-height: 52px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font: inherit;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .touch-btn:active,
    .touch-btn.is-active {
      background: rgba(255, 255, 255, 0.45);
    }

    .touch-btn.wide {
      grid-column: span 3;
    }

    @media (pointer: coarse) {
      #touch-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="hud">
      <span id="hud-coins">🪙 0</span>
      <span id="hud-lives">❤️ × 3</span>
      <span id="hud-hint">←→ 移動 / ↑ or Z ジャンプ / X 拾う・投げる</span>
    </div>

    <div id="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p id="overlay-msg"></p>
        <button type="button" id="overlay-btn">もう一度</button>
      </div>
    </div>

    <div id="touch-controls">
      <div class="touch-pad">
        <button type="button" class="touch-btn" data-action="left">←</button>
        <button type="button" class="touch-btn" data-action="up">↑</button>
        <button type="button" class="touch-btn" data-action="right">→</button>
        <button type="button" class="touch-btn wide" data-action="down">↓ しゃがみ</button>
      </div>
      <div class="touch-actions">
        <button type="button" class="touch-btn" data-action="action">X 拾/投</button>
        <button type="button" class="touch-btn" data-action="jump">A ジャンプ</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
