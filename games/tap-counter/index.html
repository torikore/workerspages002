<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>タップカウンター</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      touch-action: manipulation;
      user-select: none;
    }

    .stats {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .timer {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .count {
      font-size: clamp(3rem, 15vw, 5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      margin: 0.25rem 0;
    }

    .label {
      color: #aab;
      font-size: 0.875rem;
    }

    .tap-btn {
      min-width: min(280px, 90vw);
      min-height: min(280px, 50dvh);
      border: none;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
      color: #fff;
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(201, 42, 42, 0.4);
      touch-action: manipulation;
    }

    .tap-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .tap-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .start-btn {
      min-width: 44px;
      min-height: 44px;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      border: 2px solid #4dabf7;
      border-radius: 999px;
      background: transparent;
      color: #4dabf7;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .start-btn:hover:not(:disabled) {
      background: rgba(77, 171, 247, 0.15);
    }
  </style>
</head>
<body>
  <div class="stats">
    <div class="timer" id="timer">10.0</div>
    <div class="count" id="count">0</div>
    <div class="label">タップ数</div>
  </div>

  <button type="button" class="tap-btn" id="tap-btn" disabled>TAP!</button>
  <button type="button" class="start-btn" id="start-btn">スタート</button>

  <script src="game.js"></script>
</body>
</html>
